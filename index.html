<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Violet the Pilot - Vocabulary Flight</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-card">
        <h1>Violet the Pilot</h1>
        <div class="plane-emoji">🛩️</div>
        
        <p>Help Violet navigate Taiwan! Press Spacebar to fly up.</p>
        <p><strong>Target Goal: Reach a score of 200 to win!</strong></p>

        <button id="action-button" onclick="useLoadedQuestion()">Loading AI Questions... ⏳</button>

        <div class="progress-tracker">
            <span id="progress-text">Flight Progress: 0 / 200</span>
            <div class="progress-bar-container">
                <div id="flight-progress-fill"></div>
            </div>
        </div>
    </div>

    <div id="quiz-modal" class="modal hidden">
        <div class="modal-content">
            <h2 id="question-text">Loading question content...</h2>
            <div id="options-container" class="options-grid"></div>
        </div>
    </div>

    <script src="chat.js"></script>
    <script src="game.js"></script>
</body>
</html>

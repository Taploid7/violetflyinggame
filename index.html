<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Violet the Pilot: Taiwan Adventure</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="500"></canvas>
        
        <div id="ui-layer" class="hidden">
            <div id="hearts-container">❤️❤️❤️</div>
            <div id="score-container">Score: 0</div>
        </div>

        <div id="start-screen">
            <h1>Violet the Pilot</h1>
            <p>Help Violet navigate Taiwan! Press Spacebar to fly up.</p>
            <p>Answer English vocabulary questions if you dip too low!</p>
            <button id="start-btn" onclick="startGameNow()">Start Flight 🛫</button>
        </div>

        <div id="quiz-modal" class="hidden">
            <div class="modal-content">
                <h2 id="modal-title">Oh no! Violet is dipping!</h2>
                <p id="instruction">Answer correctly to fly back up!</p>
                <div id="question-text">Loading question...</div>
                <div id="options-container"></div>
            </div>
        </div>

        <div id="game-over-screen" class="hidden">
            <h1>Game Over</h1>
            <p id="final-score">You explored Taiwan!</p>
            <button id="restart-btn" onclick="resetGame()">Fly Again</button>
        </div>
    </div>

    <script src="chat.js"></script>
    <script src="game.js"></script>
</body>
</html>

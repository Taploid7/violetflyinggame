<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Violet the Pilot - Vocabulary Flight Academy</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="game-container">
        <div id="ui-layer">
            <div id="score-container">Score: 0</div>
            <div id="hearts-container">❤️❤️❤️</div>
        </div>

        <canvas id="gameCanvas" width="800" height="500"></canvas>

        <div id="start-screen">
            <h1>VIOLET THE PILOT</h1>
            <p>Help Violet steer clear of obstacles by mastering your vocabulary!</p>
            
            <div class="preloader-box">
                <span id="progress-text">Syncing with Gemini AI: 0%</span>
                <div class="bar-bg">
                    <div id="flight-progress-fill" class="bar-fill"></div>
                </div>
            </div>

            <button id="start-btn" disabled>PRELOADING SQUADRON... ⏳</button>
        </div>

        <div id="quiz-modal" class="hidden">
            <div class="modal-content">
                <h2>⚠️ TURBULENCE DETECTED!</h2>
                <p id="question-text">Loading emergency flight query...</p>
                <div id="options-container">
                    </div>
            </div>
        </div>

        <div id="game-over-screen" class="hidden">
            <h1>CRASH LANDING!</h1>
            <p id="final-score">Your Score: 0</p>
            <button id="restart-btn">FLY AGAIN 🔄</button>
        </div>

        <div id="victory-screen" class="hidden">
            <div class="victory-content">
                <span class="trophy">🏆</span>
                <h1>ACE PILOT!</h1>
                <p>Incredible! You cleared all vocabulary tracks safely!</p>
                <button id="win-restart-btn">NEXT MISSION 🛫</button>
            </div>
            <div class="confetti-container">
                <div class="confetti"></div>
                <div class="confetti"></div>
                <div class="confetti"></div>
                <div class="confetti"></div>
                <div class="confetti"></div>
            </div>
        </div>
    </div>

    <script src="chat.js"></script>
    <script src="game.js"></script>
</body>
</html>
